_schema-version: 3.1
ID: horarios-flexible
version: 1.0.3
description: Horario Flexible Fiori - MTA deployment descriptor

parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

modules:
  - name: horariosflexible-ui
    type: html5
    path: .
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build:mta
      supported-platforms: []
      build-result: dist
    properties:
      SAP_CLOUD_SERVICE: horariosflexible

  - name: horariosflexible-content
    type: com.sap.application.content
    path: .
    requires:
      - name: horariosflexible-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - horariosflexible-ui.zip
          name: horariosflexible-ui
          target-path: resources/

  - name: horariosflexible-destination-content
    type: com.sap.application.content
    build-parameters:
      no-source: true
    requires:
      - name: horariosflexible-destination-service
        parameters:
          content-target: true
      - name: horariosflexible-html5-repo-host
        parameters:
          service-key:
            name: horariosflexible-html5-repo-host-key
      - name: horariosflexible-uaa
        parameters:
          service-key:
            name: horariosflexible-uaa-key
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: horariosflexible_html5_repo_host
              ServiceInstanceName: horariosflexible-html5-repo-host
              ServiceKeyName: horariosflexible-html5-repo-host-key
              sap.cloud.service: horariosflexible
            - Name: horariosflexible_xsuaa
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: horariosflexible-uaa
              ServiceKeyName: horariosflexible-uaa-key
              sap.cloud.service: horariosflexible

resources:
  - name: horariosflexible-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  - name: horariosflexible-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: dest_int_s
                Type: HTTP
                ProxyType: Internet
                URL: https://ccb-is-dev-5v6vds1v.it-cpi034-rt.cfapps.us10-002.hana.ondemand.com
                Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: false

  - name: horariosflexible-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
